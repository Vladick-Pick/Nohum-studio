schema: paperclip/v1
description: Import extension defaults for NoHum Studio v1.8 single-import company package.

company:
  budgetMonthlyCents: 100000

agents:
  ceo:
    role: "ceo"
    icon: "crown"
    capabilities: "Owns venture factory policy, WIP, budget headroom, gate approvals, executive manager coordination, and governance-sensitive self-improvement approvals."
    reportsTo: null
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 20000
    permissions:
      canCreateAgents: true
    inputs:
      env: {}
    notes:
      - Day-1 core slug. Upgrade in place and validate reporting lines after import.
      - Owns bootstrap, company budget cap, Gate A/Gate B governance, and staged activation of dormant teams.
  chief-of-staff:
    role: "pm"
    icon: "target"
    capabilities: "Owns cadence, blocked-work triage, cross-team sequencing, company world model synthesis, and fleet-level self-improvement ranking."
    reportsTo: "ceo"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 5000
    permissions:
      canCreateAgents: true
    inputs:
      env: {}
    notes:
      - Day-1 ops support. Keep work narrow until bootstrap and research lane are stable.
  agent-mechanic:
    role: "devops"
    icon: "wrench"
    capabilities: "Owns runtime, prompt, tool, and workspace reliability failures plus preventive fixes, approved mutations, and rollback execution."
    reportsTo: "chief-of-staff"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 4000
    permissions:
      canCreateAgents: false
    inputs:
      env:
        GITHUB_TOKEN:
          kind: secret
          requirement: optional
        SENTRY_AUTH_TOKEN:
          kind: secret
          requirement: optional
    notes:
      - Day-1 diagnostic support only. Do not mutate secrets, budgets, or approvals.
  research-lead:
    role: "researcher"
    icon: "search"
    capabilities: "Owns sourcing, market evidence, economics, queue discipline, and final QUEUE/KILL recommendations."
    reportsTo: "ceo"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 15000
    permissions:
      canCreateAgents: true
    inputs:
      env:
        BRAVE_API_KEY:
          kind: secret
          requirement: optional
    notes:
      - Day-1 research core slug. Upgrade in place and validate reporting line after import.
      - Research owns pre-Gate-A market truth through canonical Idea Cards.
  idea-scout:
    role: "researcher"
    icon: "binoculars"
    capabilities: "Finds approved source candidates, screens obvious non-fit leads, normalizes source signals, and returns shortlist inputs to Research Lead."
    reportsTo: "research-lead"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 12000
    permissions:
      canCreateAgents: false
    inputs:
      env:
        TRUSTMRR_API_KEY:
          kind: secret
          requirement: optional
        APIFY_TOKEN:
          kind: secret
          requirement: optional
    notes:
      - Day-1 research source intake. Keep read-only and blocked-state aware.
  competitor-scout:
    role: "researcher"
    icon: "telescope"
    capabilities: "Proves direct competitors, pricing surfaces, and category shape with explicit freshness and citations."
    reportsTo: "research-lead"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 12000
    permissions:
      canCreateAgents: false
    inputs:
      env:
        APIFY_TOKEN:
          kind: secret
          requirement: optional
        OPENROUTER_API_KEY:
          kind: secret
          requirement: optional
    notes:
      - Day-1 Research specialist. Writes only into canonical Idea Card competition evidence.
  demand-validator:
    role: "researcher"
    icon: "activity"
    capabilities: "Validates demand evidence through search, traffic, communities, and observable buyer behavior while labeling evidence strength."
    reportsTo: "research-lead"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 12000
    permissions:
      canCreateAgents: false
    inputs:
      env:
        APIFY_TOKEN:
          kind: secret
          requirement: optional
    notes:
      - Day-1 Research specialist. Writes only into canonical Idea Card demand evidence.
  revenue-validator:
    role: "researcher"
    icon: "badge-dollar-sign"
    capabilities: "Validates pricing, payment paths, MRR plausibility, and monetization risks before an idea can queue for Gate A."
    reportsTo: "research-lead"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 12000
    permissions:
      canCreateAgents: false
    inputs:
      env: {}
    notes:
      - Day-1 Research specialist. Writes only into canonical Idea Card monetization evidence.
  launch-lead:
    role: "pm"
    icon: "rocket"
    capabilities: "Owns Product Bet activation after Gate A, Gate B readiness doctrine, and launch coordination boundaries."
    reportsTo: "ceo"
    adapter:
      type: codex_local
      config:
        model: gpt-5.5
        modelReasoningEffort: high
        dangerouslyBypassApprovalsAndSandbox: false
    runtime:
      modelProfiles:
        cheap:
          enabled: false
    budgetMonthlyCents: 8000
    permissions:
      canCreateAgents: false
    inputs:
      env: {}
    notes:
      - Day-1 boundary owner only. Product Bet, Build, GTM, and Support agents may exist, but stay dormant until gate artifacts and manager-created tasks activate them.
      - Gate B recommendation remains a recommendation, not build approval.
