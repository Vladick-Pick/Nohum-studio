routines:
  weekly-board-review:
    triggers:
      - kind: schedule
        cronExpression: "0 10 * * 1"
        timezone: Europe/Istanbul
  portfolio-health-review:
    triggers:
      - kind: schedule
        cronExpression: "0 12 * * 1"
        timezone: Europe/Istanbul
