          kind: secret
          requirement: optional
    notes:
      - Manager of definition, build, launch, and support lanes. Existing live agent should be upgraded in place.
  product-definer:
    adapter:
      type: codex_local
      config:
        model: gpt-5.4
        modelReasoningEffort: high
    budgetMonthlyCents: 15000
    inputs:
